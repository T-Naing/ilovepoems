{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>I love poems</title>
        <!-- <link rel="stylesheet" href="css/styles.css"> -->
        <link rel="stylesheet" href="{% static 'poems/css/styles.css' %}">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Noto+Sans+Myanmar:wght@100;200;300;400;500;600;700;800;900&family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap"
              rel="stylesheet">
        <!-- Facebook Open Graph Meta Tags -->
        <meta property="og:title" content="I Love Poems" />
        <meta property="og:description"
              content="Discover and share beautiful poems that touch the soul." />
        <meta property="og:image"
              content="https://t-naing.github.io/ilovepoems/images/ilovepoems_fb.png" />
        <meta property="og:url" content="https://t-naing.github.io/ilovepoems/" />
        <meta property="og:type" content="website" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt"
              content="I Love Poems logo with a heart and open book" />
    </head>
    <body>
        <header class="header">
            <nav class="nav-bar">
                <div class="brand">
                    <a href="{% url 'poems:index' %}" class="brand-name-wrapper">
                        <h1 class="brand-name">I Love Poems</h1>
                    </a>
                    <a href="{% url 'poems:index' %}" class="logo-wrapper">
                        <div id="logo-img" alt="ilovepoems logo"></div>
                    </a>
                </div>
                <input type="checkbox" id="menu-toggle" class="menu-toggle">
                <label for="menu-toggle" class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <div class="nav-links-container">
                    <ul class="nav-links">
                        <li>
                            <a href="{% url 'poems:index' %}" class="nav-link">Home</a>
                        </li>
                        {% comment %} <li>
                            <a href="{% url 'poems:index' %}" class="nav-link">My Poems</a>
                        </li> {% endcomment %}
                        <li>
                            <a href="{% url 'poems:poems' %}" class="nav-link">Poems</a>
                        </li>
                        <li>
                            <a href="{% url 'poems:poets' %}" class="nav-link">Poets</a>
                        </li>
                        <li>
                            <a href="{% url 'poems:about' %}" class="nav-link">About</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </header>
        <hr id="header-separator">
        <main>
            <section id="message-sec">
                <p class="poem-line-mm message-mm">ကဗျာများကို နှစ်သက်မိ၍ ဘာသာပြန်ရန် စမ်းသပ် အားထုတ်မိခြင်းသာ ဖြစ်သည်။</p>
            </section>
            <section id="display-sec">
                {% block content %}
                {% endblock content %}
            </section>
        </main>
        <hr>
        <footer>
            <p>&copy; ILOVEPOEMS</p>
        </footer>
    <!-- <script src="js/ajax-utils.js"></script>
                                                                            	<script src="js/script.js"></script> -->
    <script src="{% static 'poems/js/ajax-utils.js' %}"></script>
    <script src="{% static 'poems/js/script.js' %}"></script>
</body>
</html>
